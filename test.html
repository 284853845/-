<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APP 下载中心</title>
  <style>
    :root {
      --bg: #f6f8ff;
      --ink: #122033;
      --muted: #61708a;
      --line: rgba(99, 117, 148, 0.18);
      --panel: rgba(255, 255, 255, 0.82);
      --shadow: 0 24px 70px rgba(32, 48, 86, 0.16);
      --radius: 8px;
      --android: #20b15a;
      --ios: #1c2636;
      --harmony: #e53b52;
      --prod: #2456ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 12%, rgba(36, 86, 255, 0.18), transparent 26%),
        radial-gradient(circle at 88% 6%, rgba(32, 177, 90, 0.16), transparent 24%),
        linear-gradient(145deg, #f8fbff 0%, #eef3ff 48%, #f7faff 100%);
    }

    .page {
      width: min(1180px, calc(100% - 32px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 48px 0;
      display: grid;
      align-content: center;
      gap: 28px;
    }

    .hero {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 18px;
    }

    .logo {
      width: 76px;
      height: 76px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 800;
      font-size: 28px;
      letter-spacing: 0;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.28), transparent 38%),
        linear-gradient(135deg, #2456ff, #20b15a 58%, #e53b52);
      box-shadow: 0 18px 38px rgba(36, 86, 255, 0.28);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(32px, 5vw, 54px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      max-width: 760px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.8;
    }

    .app-switcher {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 12px 30px rgba(32, 48, 86, 0.1);
      overflow-x: auto;
      overscroll-behavior-x: contain;
      scroll-snap-type: x proximity;
      scrollbar-width: none;
    }

    .app-switcher::-webkit-scrollbar {
      display: none;
    }

    .app-tab {
      appearance: none;
      min-height: 38px;
      min-width: 92px;
      max-width: 132px;
      flex: 0 0 auto;
      border: 1px solid rgba(99, 117, 148, 0.16);
      border-radius: 8px;
      padding: 0 12px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.72);
      font: inherit;
      font-size: 14px;
      font-weight: 800;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      scroll-snap-align: start;
      transition: color 180ms ease, background 180ms ease, border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
    }

    .app-tab:hover {
      border-color: rgba(36, 86, 255, 0.34);
      transform: translateY(-1px);
    }

    .app-tab.active {
      color: #fff;
      border-color: rgba(36, 86, 255, 0.65);
      background: linear-gradient(135deg, #2456ff, #19a7ff);
      box-shadow: 0 10px 20px rgba(36, 86, 255, 0.24);
    }

    .app-tab:focus-visible {
      outline: 3px solid rgba(36, 86, 255, 0.24);
      outline-offset: 2px;
    }

    .download-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .system-card {
      position: relative;
      overflow: hidden;
      min-width: 0;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .system-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 4px;
      background: var(--accent);
    }

    .system-card.android {
      --accent: linear-gradient(90deg, #20b15a, #70e09b);
    }

    .system-card.ios {
      --accent: linear-gradient(90deg, #1c2636, #8794a8);
    }

    .system-card.harmony {
      --accent: linear-gradient(90deg, #e53b52, #2456ff);
    }

    .system-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .system-icon {
      width: 46px;
      height: 46px;
      flex: 0 0 auto;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #fff;
      box-shadow: 0 12px 28px rgba(18, 32, 51, 0.15);
    }

    .android .system-icon {
      background: linear-gradient(135deg, #20b15a, #5fe38d);
    }

    .ios .system-icon {
      background: linear-gradient(135deg, #111827, #667085);
    }

    .harmony .system-icon {
      background: linear-gradient(135deg, #e53b52, #2456ff);
    }

    .system-icon svg {
      width: 25px;
      height: 25px;
      fill: currentColor;
    }

    .system-name {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .system-desc {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .env-list {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .download-btn {
      appearance: none;
      width: 100%;
      min-height: 56px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 8px;
      padding: 0 13px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #fff;
      font: inherit;
      font-weight: 720;
      letter-spacing: 0;
      text-decoration: none;
      cursor: pointer;
      background: linear-gradient(135deg, var(--btn-from), var(--btn-to));
      box-shadow: 0 12px 22px var(--btn-shadow);
      transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
    }

    .download-btn:hover {
      transform: translateY(-2px);
      filter: saturate(1.08);
      box-shadow: 0 16px 28px var(--btn-shadow);
    }

    .download-btn:active {
      transform: translateY(0);
      box-shadow: 0 8px 16px var(--btn-shadow);
    }

    .download-btn:focus-visible {
      outline: 3px solid rgba(36, 86, 255, 0.28);
      outline-offset: 2px;
    }

    .android .download-btn {
      --btn-from: #20b15a;
      --btn-to: #58d989;
      --btn-shadow: rgba(32, 177, 90, 0.28);
    }

    .ios .download-btn {
      --btn-from: #1c2636;
      --btn-to: #5d6a7f;
      --btn-shadow: rgba(28, 38, 54, 0.24);
    }

    .harmony .download-btn {
      --btn-from: #e53b52;
      --btn-to: #6a5cff;
      --btn-shadow: rgba(229, 59, 82, 0.24);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 34px;
      z-index: 20;
      max-width: min(420px, calc(100% - 32px));
      padding: 13px 18px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      color: #fff;
      background: rgba(18, 32, 51, 0.92);
      box-shadow: 0 18px 48px rgba(18, 32, 51, 0.28);
      transform: translate(-50%, 16px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 920px) {
      .page {
        align-content: start;
      }

      .download-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .page {
        width: min(100% - 20px, 1180px);
        padding: 18px 0 24px;
        gap: 14px;
      }

      .hero {
        grid-template-columns: auto 1fr;
        gap: 10px;
      }

      .logo {
        width: 52px;
        height: 52px;
        font-size: 20px;
      }

      h1 {
        margin-bottom: 4px;
        font-size: 26px;
      }

      .subtitle {
        font-size: 13px;
        line-height: 1.45;
      }

      .app-switcher {
        gap: 6px;
        padding: 6px;
        margin: 0 -2px;
      }

      .app-tab {
        min-height: 36px;
        min-width: 84px;
        max-width: 112px;
        padding: 0 10px;
        font-size: 13px;
      }

      .system-card {
        padding: 14px;
      }

      .download-grid {
        gap: 12px;
      }

      .system-head {
        gap: 9px;
        margin-bottom: 10px;
      }

      .system-icon {
        width: 38px;
        height: 38px;
      }

      .system-icon svg {
        width: 21px;
        height: 21px;
      }

      .system-name {
        font-size: 18px;
      }

      .system-desc {
        margin-top: 2px;
        font-size: 12px;
      }

      .env-list {

        gap: 8px;
      }

      .download-btn {
        min-height: 54px;
        padding: 0 6px;
        font-size: 14px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>

    const pageTitle = document.querySelector("#page-title");
    const appDescription = document.querySelector("#app-description");
    const appSwitcher = document.querySelector(".app-switcher");
    const toast = document.querySelector(".toast");
    let toastTimer = null;
    let currentAppId = apps[0].id;

    function getCurrentApp() {
      return apps.find((app) => app.id === currentAppId) || apps[0];
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");

      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove("show");
      }, 2200);
    }

    function renderAppSwitcher() {
      appSwitcher.innerHTML = "";

      apps.forEach((app) => {
        const tab = document.createElement("button");
        tab.type = "button";
        tab.className = "app-tab";
        tab.dataset.appId = app.id;
        tab.textContent = app.shortName || app.name;
        tab.setAttribute("aria-pressed", String(app.id === currentAppId));

        if (app.id === currentAppId) {
          tab.classList.add("active");
        }

        tab.addEventListener("click", () => {
          currentAppId = app.id;
          updateCurrentApp();
          showToast(`已切换到 ${app.name}`);
          tab.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
        });

        appSwitcher.appendChild(tab);
      });
    }

    function renderDownloadLinks() {
      const app = getCurrentApp();

      document.querySelectorAll(".env-list").forEach((list) => {
        const platform = list.dataset.platform;
        const items = (app.downloads || []).filter((item) => item.platform === platform);
        list.innerHTML = "";

        items.forEach((item) => {
          const link = document.createElement("a");
          link.className = "download-btn";
          link.href = item.url || "#";
          link.dataset.platform = item.platform;
          link.textContent = item.text;

          link.addEventListener("click", (event) => {
            if (!item.url) {
              event.preventDefault();
              showToast(`${app.name} ${platformLabels[item.platform] || item.platform} ${item.text}链接待配置`);
            }
          });

          list.appendChild(link);
        });
      });
    }

    function updateCurrentApp() {
      const app = getCurrentApp();
      pageTitle.textContent = `${app.name} 下载中心`;
      appDescription.textContent = app.description || "请选择对应系统与环境下载安装包。";
      document.querySelectorAll(".app-tab").forEach((tab) => {
        const active = tab.dataset.appId === app.id;
        tab.classList.toggle("active", active);
        tab.setAttribute("aria-pressed", String(active));
      });

      renderDownloadLinks();
    }

    renderAppSwitcher();
    updateCurrentApp();
  </script>
</body>
</html>
